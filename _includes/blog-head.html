<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ page.title }} | ふじえもんのおへや</title>
<meta name="description" content="{{ page.excerpt | strip_html | truncate: 160 }}">
<meta name="author" content="ふじえもん">
<link rel="icon" href="/favicon-32.ico" type="image/x-icon">
<link rel="apple-touch-icon" href="/image/fujiemon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=BIZ+UDGothic:wght@400;700&family=BIZ+UDPGothic:wght@400;700&display=swap" rel="stylesheet">

<!-- OGP -->
<meta property="og:title" content="{{ page.title }}">
<meta property="og:description" content="{{ page.excerpt | strip_html | truncate: 160 }}">
<meta property="og:image" content="https://fujiemon.dev/image/fujiemon.png">
<meta property="og:url" content="https://fujiemon.dev{{ page.url }}">
<meta property="og:type" content="article">
<meta property="og:site_name" content="ふじえもんのおへや">
<meta property="og:locale" content="ja_JP">
<meta name="twitter:card" content="summary">
<meta name="twitter:site" content="@fujiengineer">
<meta name="twitter:creator" content="@fujiengineer">
<meta name="twitter:title" content="{{ page.title }}">
<meta name="twitter:description" content="{{ page.excerpt | strip_html | truncate: 160 }}">
<meta name="twitter:image" content="https://fujiemon.dev/image/fujiemon.png">

<link rel="stylesheet" href="/style.css">
<link rel="stylesheet" href="/css/blog.css">

<!-- JSON-LD: BlogPosting -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BlogPosting",
  "headline": {{ page.title | jsonify }},
  "description": {{ page.excerpt | strip_html | truncate: 160 | jsonify }},
  "datePublished": "{{ page.date | date_to_xmlschema }}",
  "dateModified": "{{ page.date | date_to_xmlschema }}",
  "author": {
    "@type": "Person",
    "name": "Shota Fujie",
    "alternateName": "ふじえもん",
    "url": "https://fujiemon.dev"
  },
  "publisher": {
    "@type": "Person",
    "name": "Shota Fujie",
    "url": "https://fujiemon.dev"
  },
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": "https://fujiemon.dev{{ page.url }}"
  },
  "image": "https://fujiemon.dev/image/fujiemon.png",
  "inLanguage": "{{ page.lang | default: 'ja' }}"{% if page.tags.size > 0 %},
  "keywords": {{ page.tags | join: ', ' | jsonify }}{% endif %}
}
</script>
