title: ふじえもんのおへや
description: fujiemon's homepage
url: https://fujiemon.dev
timezone: Asia/Tokyo

permalink: /blog/:year/:month/:title/

defaults:
  - scope:
      path: "_posts"
      type: "posts"
    values:
      layout: blog-post

plugins:
  - jekyll-sitemap

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - .claude
